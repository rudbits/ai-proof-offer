<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Proof Your Offer | Workshop Workbook</title>
    <style>
        :root {
            --terracotta: #C2410C;
            --terracotta-dark: #9A3412;
            --cream: #FFFBEB;
            --charcoal: #1C1917;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--charcoal);
            background: linear-gradient(135deg, var(--terracotta) 0%, var(--terracotta-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 48px;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .badge {
            display: inline-block;
            background: var(--cream);
            color: var(--terracotta);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 36px;
            font-weight: 800;
            color: var(--charcoal);
            margin-bottom: 12px;
            line-height: 1.1;
        }
        
        .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 32px;
        }
        
        .framework {
            display: inline-block;
            background: var(--terracotta);
            color: white;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 32px;
        }
        
        .download-btn {
            display: inline-block;
            background: var(--charcoal);
            color: white;
            padding: 16px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            margin: 8px;
        }
        
        .download-btn:hover {
            background: var(--terracotta);
            transform: translateY(-2px);
        }
        
        .download-btn.secondary {
            background: white;
            color: var(--charcoal);
            border: 2px solid var(--charcoal);
        }
        
        .download-btn.secondary:hover {
            background: var(--charcoal);
            color: white;
        }
        
        .footer {
            margin-top: 32px;
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">Free Download</div>
        <h1>AI-Proof<br>Your Offer</h1>
        <p class="subtitle">A hands-on workbook for creative entrepreneurs who want to build a business around judgment—not tasks.</p>
        <div class="framework">Judgment Over Execution</div>
        
        <br>
        
        <a href="workbook.pdf" class="download-btn" download>📥 Download PDF</a>
        <a href="workshop-workbook.html" class="download-btn secondary">👁️ View Online</a>
        
        <div class="footer">
            <p>© 2026 Matt Rud</p>
        </div>
    </div>
</body>
</html>
